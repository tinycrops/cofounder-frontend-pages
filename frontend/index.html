<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cofounder Frontend</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="mascot-row">
        <div class="robot" aria-hidden="true">
          <div class="thought">
            <span class="dot d1">.</span><span class="dot d2">.</span><span class="dot d3">o</span>
            <span class="bubble">let's build something</span>
          </div>
          <pre class="bot-art"><span class="antenna">  |  </span>
<span class="head">[<span class="eye l-eye">o</span>.<span class="eye r-eye">o</span>]</span>
<span class="body">/|==|\</span>
  <span class="legs">d  b</span></pre>
        </div>
        <div class="header-text">
          <h1 class="title">Cofounder Public Frontend</h1>
          <p class="subtitle">Hosted on GitHub Pages. Backend runs privately behind Tailscale Funnel.</p>
          <div id="health-status" class="status warn">Checking backend health...</div>
        </div>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Submit Business Idea</h2>
        <form id="idea-form">
          <label for="name">Name</label>
          <input id="name" name="name" placeholder="Founder name" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="name@example.com" required />

          <label for="idea">Idea</label>
          <textarea id="idea" name="idea" placeholder="Describe your idea" required></textarea>

          <button type="submit">Submit to Backend</button>
        </form>
        <p class="small">If backend is down, submit falls back to mailto.</p>
      </section>

      <section class="card">
        <h2>API Response</h2>
        <pre id="api-response">No request yet.</pre>
      </section>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
